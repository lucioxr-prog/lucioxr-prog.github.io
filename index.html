<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Luciano Bettoli — Digital Business Card</title>
  <meta name="description" content="AI Consultant | Digital Marketing Specialist | AI Solutions Architect">
  <meta property="og:title" content="Luciano Bettoli — SintesiDigitale">
  <meta property="og:description" content="AI Consultant · Digital Marketing Specialist · AI Solutions Architect">
  <meta property="og:url" content="https://lucioxr-prog.github.io">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #111113;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      padding: 1.5rem;
    }

    .card {
      width: 100%;
      max-width: 380px;
      border-radius: 16px;
      overflow: hidden;
      background: #1c1c1e;
      border: 1px solid #2e2e30;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* HEADER */
    .card-header {
      background: #232325;
      padding: 20px 22px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      border-bottom: 1px solid #2e2e30;
    }

    .logo svg { display: block; }

    .header-text .name {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      line-height: 1.1;
    }

    .header-text .name span { color: #FF6B00; }

    .header-text .roles {
      font-size: 9px;
      font-weight: 400;
      color: #888;
      letter-spacing: .12em;
      margin-top: 5px;
      line-height: 1.7;
    }

    /* BODY */
    .card-body {
      padding: 18px 22px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      border-bottom: 1px solid #2e2e30;
      gap: 12px;
    }

    .contacts { display: flex; flex-direction: column; gap: 14px; }

    .contact-item { display: flex; align-items: center; gap: 10px; }

    .contact-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: 1px solid #3a3a3c;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .contact-icon svg { display: block; }

    .contact-label {
      font-size: 9px;
      color: #666;
      letter-spacing: .1em;
      font-weight: 500;
      text-transform: uppercase;
    }

    .contact-value {
      font-size: 12px;
      color: #e0e0e0;
      margin-top: 1px;
    }

    .contact-value.accent { color: #FF6B00; font-size: 11px; }

    /* QR */
    .qr-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; flex-shrink: 0; }

    .qr-box {
      background: #fff;
      padding: 8px;
      border-radius: 8px;
      display: inline-block;
    }

    .qr-label {
      font-size: 8px;
      color: #666;
      letter-spacing: .1em;
      font-weight: 500;
      text-transform: uppercase;
    }

    /* BUTTONS */
    .card-buttons {
      padding: 14px 22px;
      display: flex;
      gap: 8px;
      border-bottom: 1px solid #2e2e30;
    }

    .btn {
      flex: 1;
      padding: 10px 0;
      border-radius: 8px;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: opacity .15s, background .2s;
      text-decoration: none;
    }

    .btn:active { opacity: 0.8; transform: scale(0.97); }

    .btn-outline {
      border: 1px solid #3a3a3c;
      background: transparent;
      color: #e0e0e0;
    }

    .btn-outline:hover { background: #2a2a2c; }

    .btn-primary {
      border: none;
      background: #FF6B00;
      color: #fff;
      font-weight: 600;
    }

    .btn-primary:hover { background: #e85f00; }
    .btn-success { background: #2a7a2a !important; }

    /* FOOTER */
    .card-footer {
      padding: 12px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .08em;
      color: #e0e0e0;
    }

    .brand span { color: #FF6B00; }

    .dot { width: 5px; height: 5px; border-radius: 50%; background: #FF6B00; }

    .tagline { font-size: 9px; color: #666; letter-spacing: .08em; }
  </style>
</head>
<body>

<div class="card">

  <!-- HEADER -->
  <div class="card-header">
    <div class="logo">
      <svg width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="26,2 48,14 48,38 26,50 4,38 4,14" fill="#FF6B00"/>
        <text x="26" y="34" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-weight="800" font-size="22" fill="#fff">S</text>
      </svg>
    </div>
    <div class="header-text">
      <div class="name">Luciano <span>Bettoli</span></div>
      <div class="roles">
        AI CONSULTANT<br>
        DIGITAL MARKETING SPECIALIST<br>
        AI SOLUTIONS ARCHITECT
      </div>
    </div>
  </div>

  <!-- BODY -->
  <div class="card-body">
    <div class="contacts">

      <div class="contact-item">
        <div class="contact-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#FF6B00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,4 12,13 22,4"/>
          </svg>
        </div>
        <div>
          <div class="contact-label">Email</div>
          <div class="contact-value">lucioxr@gmail.com</div>
        </div>
      </div>

      <div class="contact-item">
        <div class="contact-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#FF6B00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
          </svg>
        </div>
        <div>
          <div class="contact-label">WhatsApp / Tel</div>
          <div class="contact-value">+39 347 425 9254</div>
        </div>
      </div>

      <a class="contact-item" href="https://lucioxr-prog.github.io/sintesidigitale" target="_blank" rel="noopener" style="text-decoration:none;">
        <div class="contact-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#FF6B00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
        </div>
        <div>
          <div class="contact-label">Sito Web</div>
          <div class="contact-value accent">lucioxr-prog.github.io/sintesidigitale</div>
        </div>
      </a>

    </div>

    <!-- QR -->
    <div class="qr-wrap">
      <div class="qr-box" id="qrContainer"></div>
      <div class="qr-label">Scansiona</div>
    </div>
  </div>

  <!-- BUTTONS -->
  <div class="card-buttons">
    <a href="mailto:lucioxr@gmail.com" class="btn btn-outline">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,4 12,13 22,4"/>
      </svg>
      Email
    </a>
    <a href="https://wa.me/393474259254" target="_blank" class="btn btn-outline">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
      </svg>
      WhatsApp
    </a>
    <button id="vcfBtn" onclick="saveContact()" class="btn btn-primary">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
        <line x1="12" y1="11" x2="12" y2="17"/>
        <line x1="9" y1="14" x2="15" y2="14"/>
      </svg>
      Salva Contatto
    </button>
  </div>

  <!-- FOOTER -->
  <div class="card-footer">
    <div class="brand">SINTESI<span>|</span>DIGITALE</div>
    <div class="dot"></div>
    <div class="tagline">PREMIUM DIGITAL SOLUTIONS</div>
  </div>

</div>

<!-- QR Code library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
  // Genera QR code
  new QRCode(document.getElementById('qrContainer'), {
    text: 'https://lucioxr-prog.github.io/sintesidigitale',
    width: 90,
    height: 90,
    colorDark: '#1c1c1e',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.H
  });

  // Salva contatto come .vcf
  function saveContact() {
    const vcf = [
      'BEGIN:VCARD',
      'VERSION:3.0',
      'FN:Luciano Bettoli',
      'N:Bettoli;Luciano;;;',
      'ORG:SintesiDigitale',
      'TITLE:AI Consultant | Digital Marketing Specialist | AI Solutions Architect',
      'TEL;TYPE=CELL,VOICE:+393474259254',
      'EMAIL;TYPE=INTERNET:lucioxr@gmail.com',
      'URL:https://lucioxr-prog.github.io',
      'NOTE:AI Consultant · Digital Marketing Specialist · AI Solutions Architect · EASA Drone Pilot A1-A3',
      'END:VCARD'
    ].join('\r\n');

    const blob = new Blob([vcf], { type: 'text/vcard;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'luciano-bettoli.vcf';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    const btn = document.getElementById('vcfBtn');
    btn.classList.add('btn-success');
    btn.innerHTML = `
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
      Salvato!
    `;
    setTimeout(() => {
      btn.classList.remove('btn-success');
      btn.innerHTML = `
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
          <line x1="12" y1="11" x2="12" y2="17"/>
          <line x1="9" y1="14" x2="15" y2="14"/>
        </svg>
        Salva Contatto
      `;
    }, 2500);
  }
</script>

</body>
</html>
