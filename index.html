<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luciano Bettoli — SintesiDigitale</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;600;700&family=Barlow+Condensed:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #050505;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Barlow', sans-serif;
      padding: 2rem 1rem;
    }
    .bv-card {
      width: 480px;
      background: #111111;
      border-radius: 20px;
      border: 1px solid #222;
      overflow: hidden;
      position: relative;
      box-shadow: 0 0 80px rgba(255,102,0,0.10), 0 20px 60px rgba(0,0,0,0.6);
      animation: fadeUp 0.6s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .bv-top-bar { height: 4px; background: #FF6600; width: 100%; }
    .bv-header {
      padding: 1.8rem 2rem 1.2rem;
      display: flex;
      align-items: flex-start;
      gap: 1.2rem;
      border-bottom: 1px solid #1e1e1e;
    }
    .bv-logo-box {
      width: 60px;
      height: 60px;
      flex-shrink: 0;
      border-radius: 12px;
      background: #000;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .bv-logo-box img { width: 54px; height: 54px; object-fit: contain; display: block; }
    .bv-name-block { flex: 1; }
    .bv-name { font-size: 22px; font-weight: 700; color: #ffffff; margin: 0 0 5px; letter-spacing: 0.3px; }
    .bv-name span { color: #FF6600; }
    .bv-role {
      font-size: 10.5px;
      color: #777;
      font-family: 'Barlow Condensed', sans-serif;
      letter-spacing: 1.6px;
      text-transform: uppercase;
      margin: 0;
      line-height: 1.8;
    }
    .bv-body { padding: 1.4rem 2rem; display: flex; gap: 1.5rem; align-items: center; }
    .bv-contacts { flex: 1; display: flex; flex-direction: column; gap: 0.9rem; }
    .bv-contact-item { display: flex; align-items: center; gap: 12px; }
    .bv-icon {
      width: 34px; height: 34px; border-radius: 8px;
      background: #1a1a1a; border: 1px solid #2a2a2a;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: border-color 0.2s, background 0.2s;
    }
    .bv-contact-item:hover .bv-icon { background: #1f1f1f; border-color: #FF6600; }
    .bv-icon i { font-size: 16px; color: #FF6600; }
    .bv-contact-label { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
    .bv-contact-text { font-size: 13px; color: #ccc; font-weight: 400; }
    .bv-qr-area { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .bv-qr-box {
      width: 92px; height: 92px; background: #fff;
      border-radius: 10px; display: flex; align-items: center; justify-content: center; padding: 6px;
    }
    .bv-qr-label { font-size: 9px; color: #444; letter-spacing: 1.5px; text-transform: uppercase; text-align: center; font-family: 'Barlow Condensed', sans-serif; }
    .bv-divider { height: 1px; background: #1a1a1a; margin: 0 2rem; }
    .bv-footer { padding: 1rem 2rem 1.5rem; }
    .bv-actions { display: flex; gap: 8px; }
    .bv-btn {
      flex: 1; height: 38px; border-radius: 8px;
      border: 1px solid #2a2a2a; background: #1a1a1a; color: #ccc;
      font-size: 12px; font-family: 'Barlow', sans-serif; font-weight: 400;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      gap: 6px; transition: background 0.15s, border-color 0.15s, color 0.15s; text-decoration: none;
    }
    .bv-btn:hover { background: #222; border-color: #FF6600; color: #FF6600; }
    .bv-btn i { font-size: 16px; }
    .bv-btn-primary { background: #FF6600; border-color: #FF6600; color: #fff; font-weight: 600; }
    .bv-btn-primary:hover { background: #e65c00; border-color: #e65c00; color: #fff; }
    .bv-brand-tag {
      padding: 0.75rem 2rem; background: #0d0d0d;
      display: flex; align-items: center; justify-content: space-between; border-top: 1px solid #1a1a1a;
    }
    .bv-brand-name { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; letter-spacing: 3px; color: #333; text-transform: uppercase; }
    .bv-brand-name span { color: #FF6600; }
    .bv-dot { width: 6px; height: 6px; border-radius: 50%; background: #FF6600; opacity: 0.4; }
    .bv-tagline { font-size: 10px; color: #333; letter-spacing: 1px; font-family: 'Barlow Condensed', sans-serif; text-transform: uppercase; }
    .toast {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
      background: #FF6600; color: #fff; font-size: 13px; font-family: 'Barlow', sans-serif;
      padding: 8px 22px; border-radius: 24px; opacity: 0; transition: opacity 0.3s;
      pointer-events: none; white-space: nowrap; z-index: 100;
    }
    .toast.show { opacity: 1; }
    @media (max-width: 520px) {
      .bv-card { width: 100%; border-radius: 16px; }
      .bv-name { font-size: 18px; }
      .bv-body { flex-direction: column; align-items: flex-start; }
      .bv-qr-area { flex-direction: row; align-items: center; gap: 12px; }
    }
  </style>
</head>
